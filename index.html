<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>User information registration form</h1>
      <form id="form" action="">
        <input
          type="text"
          name="firstName"
          class="firstNameInput"
          id="firstName"
          placeholder="enter your first Name"
        />
        <input
          type="text"
          name="lastName"
          class="lastNameInput"
          id="lastName"
          placeholder="enter your last Name"
        />
        <input
          type="text"
          name="mail"
          class="emailInput"
          id="mail"
          placeholder="enter your email"
        />
        <input
          type="text"
          name="job"
          class="jobInput"
          id="job"
          placeholder="enter your job"
        />
        <input
          type="text"
          name="phoneNumber"
          class="firstNameInput"
          id="phoneNumber"
          placeholder="enter your phone number"
        />
        <select name="gender" class="select" id="gender">
          <option value="select">select your gender</option>
          <option value="man">man</option>
          <option value="woman">woman</option>
        </select>
        <button type="submit" id="add">Add</button>
      </form>
      <div id="buttons">
        <button id="showModal">show all users</button>
        <button id="foundPerson">found with email</button>
        <button id="allHaveJob">Is everyone employed?</button>
        <button id="mans">Is there at least one man?</button>
      </div>
    </div>
    <div class="overlay" id="overlay"></div>
    <div class="modal" id="modal"></div>
    <script src="script.js"></script>
  </body>
</html>
